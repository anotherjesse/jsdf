<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sdf browser</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <h1>sdf</h1>
            <p>Browser WebGPU port</p>
          </div>
          <span id="gpuBadge" class="badge">Checking GPU</span>
        </header>

        <label class="field">
          <span>Example</span>
          <select id="exampleSelect"></select>
        </label>

        <section class="panel compact">
          <h2>View</h2>
          <div class="segmented view-toggle" aria-label="Render view">
            <button id="shaderViewButton" type="button" aria-pressed="true">Shader</button>
            <button id="meshViewButton" type="button" aria-pressed="false">Mesh</button>
            <button id="downloadButton" class="icon-button" type="button" title="Download STL" aria-label="Download STL" disabled>
              <span class="download-icon" aria-hidden="true"></span>
            </button>
          </div>
        </section>

        <section class="panel">
          <h2>Resolution</h2>
          <label class="range">
            <span>Ray steps</span>
            <input id="stepsInput" type="range" min="64" max="320" value="180" step="16">
            <output id="stepsOutput">180</output>
          </label>
          <label class="range">
            <span>Mesh grid</span>
            <input id="gridInput" type="range" min="24" max="256" value="52" step="4">
            <output id="gridOutput">52</output>
          </label>
          <div class="field">
            <span>Mesh style</span>
            <div class="segmented" aria-label="Mesh style">
              <button id="surfaceNetButton" type="button" aria-pressed="true">Surface net</button>
              <button id="tetraMeshButton" type="button" aria-pressed="false">Tetra</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Stats</h2>
          <dl class="stats">
            <div><dt>Preview</dt><dd id="previewStat">-</dd></div>
            <div><dt>STL mesh</dt><dd id="meshStat">-</dd></div>
            <div><dt>Triangles</dt><dd id="triangleStat">-</dd></div>
            <div><dt>API</dt><dd id="apiStat">-</dd></div>
          </dl>
        </section>
      </aside>

      <section class="viewport">
        <canvas id="canvas" width="1280" height="900"></canvas>
        <div id="overlay" class="overlay"></div>
      </section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
