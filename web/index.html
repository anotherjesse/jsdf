<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sdf browser</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="editor-pane">
        <header class="editor-header">
          <h2>Editor</h2>
          <div class="editor-meta">
            <div class="editor-actions" aria-label="Graph edit history">
              <button id="undoGraphButton" type="button" title="Undo graph edit (Cmd/Ctrl+Z)" aria-label="Undo graph edit" disabled>Undo</button>
              <button id="redoGraphButton" type="button" title="Redo graph edit (Cmd/Ctrl+Shift+Z)" aria-label="Redo graph edit" disabled>Redo</button>
              <button id="resetGraphButton" type="button" title="Reset graph edits" aria-label="Reset graph edits" disabled>Reset</button>
            </div>
            <span id="editorStatus" class="editor-status">Ready</span>
            <div id="graphChangeJournal" class="change-journal" aria-label="Graph changes" hidden></div>
          </div>
        </header>

        <div class="workspace-bar" aria-label="Shape file">
          <div class="document-title-field">
            <label class="sr-only" for="documentNameInput">Shape name</label>
            <input id="documentNameInput" type="text" aria-label="Shape name" placeholder="Untitled SDF">
            <span id="dirtyIndicator" class="document-dirty" hidden>Unsaved</span>
          </div>
          <button id="loadSourceButton" class="workspace-tool" type="button" title="Load" aria-label="Load">
            <span class="load-icon" aria-hidden="true"></span>
            <span class="sr-only">Load</span>
          </button>
          <button id="saveSourceButton" class="workspace-tool" type="button" title="Save (Cmd/Ctrl+S)" aria-label="Save" disabled>
            <span class="save-icon" aria-hidden="true"></span>
            <span class="sr-only">Save</span>
          </button>
          <button id="prettifySourceButton" class="workspace-tool" type="button" title="Prettify code (Alt+Shift+F)" aria-label="Prettify code" aria-keyshortcuts="Alt+Shift+F">
            <span class="format-icon" aria-hidden="true"></span>
            <span class="sr-only">Prettify</span>
          </button>
          <button id="sourceHintsButton" class="workspace-tool" type="button" title="Toggle graph hints" aria-label="Toggle graph hints" aria-pressed="true">
            <span class="hints-icon" aria-hidden="true"></span>
            <span class="sr-only">Hints</span>
          </button>
        </div>

        <div class="segmented editor-toggle" aria-label="Editor mode">
          <button id="codeModeButton" type="button" aria-pressed="true">Code</button>
          <button id="graphModeButton" type="button" aria-pressed="false">Graph</button>
        </div>

        <section id="codePanel" class="editor-panel">
          <div id="codeEditor" class="code-editor"></div>
        </section>

        <section id="graphPanel" class="editor-panel hidden">
          <div id="graphInspector" class="graph-inspector"></div>
        </section>
      </aside>

      <section class="viewport">
        <header class="viewport-header">
          <div class="viewport-actions">
            <details class="settings-popover">
              <summary title="Render settings" aria-label="Render settings">
                <span class="settings-icon" aria-hidden="true"></span>
                <span>Settings</span>
              </summary>
              <div class="settings-panel">
                <section class="panel compact">
                  <h2>Resolution</h2>
                  <label class="range">
                    <span>Ray steps</span>
                    <input id="stepsInput" type="range" min="64" max="320" value="176" step="16">
                    <output id="stepsOutput">176</output>
                  </label>
                  <label class="range">
                    <span>Mesh grid</span>
                    <input id="gridInput" type="range" min="24" max="256" value="128" step="4">
                    <output id="gridOutput">128</output>
                  </label>
                  <div class="field">
                    <span>Mesh style</span>
                    <div class="segmented" aria-label="Mesh style">
                      <button id="surfaceNetButton" type="button" aria-pressed="true">Surface net</button>
                      <button id="tetraMeshButton" type="button" aria-pressed="false">Tetra</button>
                    </div>
                  </div>
                  <div class="field">
                    <span>Bounds</span>
                    <div id="boundsEditor"></div>
                    <button id="fitBoundsButton" type="button">Fit</button>
                  </div>
                </section>
              </div>
            </details>
            <div class="segmented view-toggle" aria-label="Render view">
              <button id="shaderViewButton" type="button" aria-pressed="true">Shader</button>
              <button id="meshViewButton" type="button" aria-pressed="false">Mesh</button>
              <button id="layoutViewButton" class="icon-button" type="button" title="Toggle 2x2 view" aria-label="Toggle 2x2 view" aria-pressed="false">
                <span class="grid-icon" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
              </button>
              <button id="downloadButton" class="icon-button" type="button" title="Download STL" aria-label="Download STL" disabled>
                <span class="download-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </header>
        <div class="viewport-canvas">
          <canvas id="canvas" width="1280" height="900"></canvas>
          <div id="viewLabels" class="view-labels" aria-hidden="true"></div>
        </div>
      </section>

      <footer class="status-footer">
        <dl class="footer-stats">
          <div><dt>Preview</dt><dd id="previewStat">-</dd></div>
          <div><dt>Mesh</dt><dd id="meshStat">-</dd></div>
          <div><dt>Triangles</dt><dd id="triangleStat">-</dd></div>
          <div><dt>Renderer</dt><dd id="gpuBadge" class="footer-badge">Checking GPU</dd></div>
          <div><dt>API</dt><dd id="apiStat">-</dd></div>
        </dl>
        <div class="footer-status">
          <div id="overlay" class="status-message"></div>
          <a class="footer-link" href="./checks.html" target="_blank" rel="noreferrer">Checks</a>
        </div>
      </footer>
    </main>

    <dialog id="sourceDialog" class="source-dialog" aria-labelledby="sourceDialogTitle">
      <div class="source-dialog-card">
        <header class="source-dialog-header">
          <div>
            <h2 id="sourceDialogTitle">Load</h2>
            <p>Examples and saved shapes</p>
          </div>
          <button id="closeSourceDialogButton" class="icon-button dialog-close" type="button" title="Close" aria-label="Close">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </header>
        <div id="sourceDialogList" class="source-list"></div>
      </div>
    </dialog>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
