<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sdf preview check</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111316;
        --panel: #1c2026;
        --line: #343b45;
        --text: #eef2f6;
        --muted: #9ca8b5;
        --ok: #2fb7a8;
        --fail: #dd6a5c;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        max-width: 980px;
        margin: 0 auto;
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      #status {
        color: var(--muted);
      }

      [data-status="pass"] #status {
        color: var(--ok);
      }

      [data-status="fail"] #status {
        color: var(--fail);
      }

      canvas {
        display: block;
        width: min(100%, 760px);
        height: 440px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d0f12;
      }

      pre {
        overflow: auto;
        min-height: 260px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>sdf preview check</h1>
      <div id="status">Running preview runtime verification...</div>
      <canvas id="canvas" width="760" height="440"></canvas>
      <pre id="report"></pre>
    </main>
    <script type="module" src="./src/preview-check.ts"></script>
  </body>
</html>
